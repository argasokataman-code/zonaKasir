services:
    app:
        restart: unless-stopped
        build:
            context: .
            dockerfile: Dockerfile
            args:
                WWWUSER: ${WWWUSER:-1000}
                WWWGROUP: ${WWWGROUP:-1000}
        ports:
            - '${APP_PORT:-80}:80'
        volumes:
            - '.:/var/www/html'
            - '/var/www/html/vendor'
            - '/var/www/html/node_modules'
        networks:
            - zonakasir
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_DATABASE: zonakasir
            DB_USERNAME: zonakasir
            DB_PASSWORD: secret
            REDIS_HOST: redis
            REDIS_PORT: 6379
            CACHE_DRIVER: redis
            QUEUE_CONNECTION: redis
            SESSION_DRIVER: redis
            MAIL_HOST: mailpit
            MAIL_PORT: 1025

    postgres:
        restart: unless-stopped
        image: postgres:15-alpine
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            POSTGRES_DB: zonakasir
            POSTGRES_USER: zonakasir
            POSTGRES_PASSWORD: secret
        volumes:
            - zonakasir-postgres:/var/lib/postgresql/data
        networks:
            - zonakasir
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-zonakasir}']
            retries: 3
            timeout: 5s
            interval: 5s

    redis:
        restart: unless-stopped
        image: redis:alpine
        ports:
            - '${FORWARD_REDIS_PORT:-6380}:6379'
        volumes:
            - zonakasir-redis:/data
        networks:
            - zonakasir
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            retries: 3
            timeout: 5s
            interval: 5s

    mailpit:
        restart: unless-stopped
        image: axllent/mailpit:v1.20.3
        ports:
            - '${FORWARD_MAILPIT_PORT:-1026}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8026}:8025'
        networks:
            - zonakasir

networks:
    zonakasir:
        driver: bridge

volumes:
    zonakasir-postgres:
        driver: local
    zonakasir-redis:
        driver: local