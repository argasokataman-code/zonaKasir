name: Deploy to Staging

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, bcmath, intl, pdo_mysql
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP deps
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Install JS deps
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Package artifacts
        run: |
          tar czf /tmp/deploy-artifacts.tar.gz \
            vendor \
            public/build
          echo "Artifact size: $(du -sh /tmp/deploy-artifacts.tar.gz | cut -f1)"

      - name: Create version tag
        id: tag
        run: |
          TAG="staging-v1.0.${GITHUB_RUN_NUMBER}"
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USERNAME }}
          PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          VERSION_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          PORT="${PORT:-2223}"

          # Upload artifacts to /tmp
          echo "Uploading $(du -h /tmp/deploy-artifacts.tar.gz | cut -f1)"
          cat /tmp/deploy-artifacts.tar.gz | ssh -p "${PORT}" "${USER}@${HOST}" "cat > /tmp/deploy-artifacts.tar.gz && sync"
          ssh -p "${PORT}" "${USER}@${HOST}" "ls -la /tmp/deploy-artifacts.tar.gz"

          # Deploy
          ssh -p "${PORT}" "${USER}@${HOST}" bash -s << 'DEPLOY'
            set -e

            APP_PATH="/home/jogn3455/public_html/zonakasir.jogjatourdrive.com"
            cd "${APP_PATH}"

            php artisan down --retry=60 2>/dev/null || true

            git stash push --message "deploy-stash-$(date +%s)" 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            git stash drop 2>/dev/null || true

            test -f .env || { echo "ERROR: .env missing!"; cp .env.example .env 2>/dev/null || true; }

            # Remove dev-only files not needed on staging
            rm -rf \
              .agents/ \
              .opencode/ \
              .github/ \
              docker/ \
              docs/ \
              src/ \
              tests/ \
              node_modules/ \
              2>/dev/null || true

            rm -rf vendor public/build 2>/dev/null || true
            tar xzf /tmp/deploy-artifacts.tar.gz
            rm -f /tmp/deploy-artifacts.tar.gz

            # Run central migrations (tenant migrations added by tenancy package)
            php artisan migrate --force 2>/dev/null || true
            php artisan db:seed --class=AdminSeeder --force 2>/dev/null || true

            php artisan optimize:clear
            php artisan view:cache

            # storage:link uses exec() which is disabled on this server, create manually
            ln -sf ../storage/app/public public/storage 2>/dev/null || true
            ln -sf ../storage/app/tmp public/tmp 2>/dev/null || true
            php artisan filament:assets 2>/dev/null || true

            # Write exact version from CI tag
            echo "${{ steps.tag.outputs.tag }}" > version.txt

            php artisan up

            echo "Deploy complete!"
          DEPLOY
