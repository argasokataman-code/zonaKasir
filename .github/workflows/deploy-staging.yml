name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, bcmath, intl, pdo_mysql
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP deps
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Install JS deps
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Package artifacts
        run: |
          tar czf /tmp/deploy-artifacts.tar.gz \
            vendor \
            public/build
          echo "Artifact size: $(du -sh /tmp/deploy-artifacts.tar.gz | cut -f1)"

      - name: Create version tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG="staging-v1.0.${GITHUB_RUN_NUMBER}"
          git tag "${TAG}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${TAG}"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USERNAME }}
          PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${PORT:-2223}"

          # Upload artifacts to /tmp (outside git working tree)
          echo "Uploading $(du -h /tmp/deploy-artifacts.tar.gz | cut -f1)"
          cat /tmp/deploy-artifacts.tar.gz | ssh -p "${PORT}" "${USER}@${HOST}" "cat > /tmp/deploy-artifacts.tar.gz && sync"

          # Deploy
          ssh -p "${PORT}" "${USER}@${HOST}" bash -s << 'DEPLOY'
            set -e

            cd "${{ secrets.DEPLOY_PATH }}"

            php artisan down --retry=60 2>/dev/null || true

            git stash push --message "deploy-stash-$(date +%s)" 2>/dev/null || true
            git pull origin main
            git fetch --tags origin
            php artisan app:version-sync
            git stash drop 2>/dev/null || true

            test -f .env || { echo "ERROR: .env missing!"; cp .env.example .env 2>/dev/null || true; }

            rm -rf vendor public/build 2>/dev/null || true
            tar xzf /tmp/deploy-artifacts.tar.gz
            rm -f /tmp/deploy-artifacts.tar.gz

            php artisan migrate --path=database/migrations/tenant --force

            php artisan optimize:clear
            php artisan view:cache

            php artisan storage:link 2>/dev/null || true
            php artisan filament:assets 2>/dev/null || true

            php artisan up

            echo "Deploy complete!"
          DEPLOY
