name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, bcmath, intl, pdo_mysql
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP deps
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Install JS deps
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Package artifacts
        run: |
          tar czf /tmp/deploy-artifacts.tar.gz \
            vendor \
            public/build
          echo "Artifact size: $(du -sh /tmp/deploy-artifacts.tar.gz | cut -f1)"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USERNAME }}
          PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          PORT="${PORT:-2223}"

          # Upload artifacts to /tmp (outside git working tree to avoid git stash issues)
          echo "Uploading $(du -h /tmp/deploy-artifacts.tar.gz | cut -f1) to ${USER}@${HOST}:/tmp/"
          cat /tmp/deploy-artifacts.tar.gz | ssh -p "${PORT}" "${USER}@${HOST}" "cat > /tmp/deploy-artifacts.tar.gz && echo UPLOAD_DONE && sync"
          echo "Upload pipeline completed"

          # Verify file exists on remote
          ssh -p "${PORT}" "${USER}@${HOST}" "test -f /tmp/deploy-artifacts.tar.gz && echo FILE_EXISTS || echo FILE_MISSING"

          # Deploy commands
          ssh -p "${PORT}" "${USER}@${HOST}" bash -s << 'DEPLOY'
            set -e

            PATH_DEPLOY="${{ secrets.DEPLOY_PATH }}"
            cd "${PATH_DEPLOY}"

            # Maintenance mode
            php artisan down --retry=60 2>/dev/null || true

            # Stash any local changes to tracked files, then pull latest code
            git stash push --message "deploy-stash-$(date +%s)" 2>/dev/null || true
            git pull origin main
            git stash drop 2>/dev/null || true

            # Verify .env exists
            test -f .env || { echo "ERROR: .env missing!"; cp .env.example .env 2>/dev/null || true; }

            # Remove old vendor/build, extract from /tmp
            rm -rf vendor public/build 2>/dev/null || true
            tar xzf /tmp/deploy-artifacts.tar.gz
            rm -f "${PATH_DEPLOY}/deploy-artifacts.tar.gz"

            # Run migrations
            php artisan migrate --path=database/migrations/tenant --force

            # Clear cache only (skip config:cache / route:cache — causes issues
            # with tenancy and env() on shared hosting)
            php artisan optimize:clear
            php artisan view:cache

            # Storage link (safe to run on every deploy)
            php artisan storage:link 2>/dev/null || true

            # Filament assets
            php artisan filament:assets 2>/dev/null || true

            # Bring app back up
            php artisan up

            echo "Deploy complete!"
          DEPLOY

          # Diagnostic
          ssh -p "${PORT}" "${USER}@${HOST}" bash -s << 'DIAG'
            PATH_DEPLOY="${{ secrets.DEPLOY_PATH }}"
            echo "=== DIAGNOSTIC ==="
            echo "User: $(whoami)"
            echo "PWD: $(pwd)"
            echo "--- Project root ---"
            ls -la "${PATH_DEPLOY}" | head -5
            echo "--- Public dir ---"
            ls -la "${PATH_DEPLOY}/public" | head -10
            echo "--- .env ---"
            test -f "${PATH_DEPLOY}/.env" && echo ".env exists" || echo ".env MISSING!"
            grep -c "APP_URL\|APP_KEY\|DB_" "${PATH_DEPLOY}/.env" 2>/dev/null && grep "APP_URL\|APP_KEY" "${PATH_DEPLOY}/.env" 2>/dev/null || echo "Cannot read .env"
            echo "--- Index.php ---"
            ls -la "${PATH_DEPLOY}/public/index.php" 2>/dev/null || echo "index.php MISSING!"
            echo "--- Permissions ---"
            stat -c "%a %u %g %n" "${PATH_DEPLOY}/public" 2>/dev/null; ls -ld "${PATH_DEPLOY}/public" 2>/dev/null
            echo "--- Maintenance ---"
            php "${PATH_DEPLOY}/artisan" down:status 2>/dev/null || echo "down:status failed"
            echo "=== END DIAGNOSTIC ==="
          DIAG
