name: test

on:
  push:
    branches: [main, vercel, 1.x]
  pull_request:
    branches: [main, vercel, 1.x]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [8.4]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: zonakasir
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: lakasir_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, bcmath, intl, pdo_pgsql
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Setup .env for PgSQL
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests (PostgreSQL)
        run: |
          mkdir -p reports
          php artisan test > reports/test-output.txt 2>&1
        env:
          DB_CONNECTION: testing
          DB_TESTING_DRIVER: pgsql
          DB_DATABASE_TESTING: lakasir_test
          DB_USERNAME_TESTING: zonakasir
          DB_PASSWORD_TESTING: secret
          SESSION_DRIVER: array
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: PHP Test Report (PostgreSQL)
          path: reports/junit.xml
          reporter: java-junit

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-pgsql
          path: reports/

  # Aggregated status — deploy workflows depend on THIS
  test-complete:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ All tests passed!"
            echo "test_passed=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Tests failed!"
            echo "test: ${{ needs.test.result }}"
            echo "test_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        id: gate

  # QA Report — markdown summary
  qa-report:
    name: QA Test Report
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: test-reports-pgsql
          path: reports
        continue-on-error: true

      - name: Generate QA summary
        run: |
          echo "## 🧪 QA Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PostgreSQL | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat reports/test-output.txt 2>/dev/null || echo "No output available" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
