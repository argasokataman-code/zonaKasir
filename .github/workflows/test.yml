name: test

on:
  push:
    branches: [main, vercel, 1.x]
  pull_request:
    branches: [main, vercel, 1.x]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sqlite:
    name: SQLite Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [8.4]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, bcmath, intl, pdo_sqlite
          tools: composer:v2
          coverage: xdebug

      - name: Get composer cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Setup .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests (SQLite) + JUnit report
        run: |
          mkdir -p reports
          php artisan test --parallel --reporter=junit --log-junit=reports/junit.xml 2>&1 | tee reports/test-output.txt || true

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: PHP Test Report (SQLite)
          path: reports/junit.xml
          reporter: java-junit

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-sqlite
          path: reports/

  pgsql:
    name: PostgreSQL Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [8.4]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: zonakasir
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: lakasir_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, bcmath, intl, pdo_pgsql
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Setup .env for PgSQL
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests (PostgreSQL)
        run: |
          mkdir -p reports
          php artisan test --parallel --reporter=junit --log-junit=reports/junit.xml 2>&1 | tee reports/test-output.txt || true
        env:
          DB_TESTING_DRIVER: pgsql
          DB_DATABASE_TESTING: lakasir_test
          DB_USERNAME_TESTING: zonakasir
          DB_PASSWORD_TESTING: secret

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: PHP Test Report (PostgreSQL)
          path: reports/junit.xml
          reporter: java-junit

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-pgsql
          path: reports/

  # Aggregated status — deploy workflows depend on THIS
  test-complete:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [sqlite, pgsql]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.sqlite.result }}" = "success" ] && [ "${{ needs.pgsql.result }}" = "success" ]; then
            echo "✅ All tests passed!"
            echo "test_passed=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Tests failed!"
            echo "SQLite: ${{ needs.sqlite.result }}"
            echo "PostgreSQL: ${{ needs.pgsql.result }}"
            echo "test_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        id: gate

  # QA Report — markdown summary
  qa-report:
    name: QA Test Report
    runs-on: ubuntu-latest
    needs: [sqlite, pgsql]
    if: always()
    steps:
      - name: Download SQLite report
        uses: actions/download-artifact@v4
        with:
          name: test-reports-sqlite
          path: reports/sqlite
        continue-on-error: true

      - name: Download PgSQL report
        uses: actions/download-artifact@v4
        with:
          name: test-reports-pgsql
          path: reports/pgsql
        continue-on-error: true

      - name: Generate QA summary
        run: |
          echo "## 🧪 QA Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SQLite | ${{ needs.sqlite.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PostgreSQL | ${{ needs.pgsql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SQLite Test Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat reports/sqlite/test-output.txt 2>/dev/null || echo "No output available" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### PostgreSQL Test Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat reports/pgsql/test-output.txt 2>/dev/null || echo "No output available" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
